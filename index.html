<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💀 Death Predictor 💀</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Montserrat:wght@400;700&display=swap');

    :root{
      --bg:#0b0b0b;--panel:#111;--accent:#e0115f;--glow:#ff1744;--text:#f5f5f5;--muted:#bbbbbb;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; color:var(--text);
      background: radial-gradient(circle at 20% 10%, #1b0010 0%, #0b0b0b 35%, #000 100%);
      font-family:'Montserrat',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      overflow-x:hidden;
    }

    header{text-align:center; padding:28px 16px 6px;}
    h1{
      font-family:'Creepster', cursive; margin:0;
      font-size:clamp(2.2rem, 2.6rem + 1vw, 4rem);
      letter-spacing:2px; color:#fff;
      text-shadow:0 0 10px var(--glow), 0 0 25px var(--accent);
      animation:flicker 2.2s infinite alternate ease-in-out;
    }
    @keyframes flicker{from{filter:brightness(.95)} to{filter:brightness(1.25)}}
    .sub{margin-top:6px; color:var(--muted); font-size:.95rem; text-align:center}

    .container{
      max-width:950px; margin:22px auto; padding:20px; border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 0 30px rgba(224,17,95,0.2);
    }

    .form-grid{display:grid; grid-template-columns:repeat(2, minmax(260px,1fr)); gap:18px;}
    .card{background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:16px}
    .card h2{font-family:'Creepster'; margin:0 0 8px; font-size:1.6rem; color:#fff}
    label.inline{display:inline-flex; align-items:center; gap:8px; margin-right:14px}
    input[type="number"]{width:160px; padding:10px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:#0f0f0f; color:#fff; outline:none;}
    input[type="radio"], input[type="checkbox"]{accent-color:var(--accent)}

    .foods{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin-top:8px}
    .foods label{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; background:#101010; border:1px solid rgba(255,255,255,.06); cursor:pointer; transition:.2s}
    .foods label:hover{transform:translateY(-2px); box-shadow:0 10px 20px rgba(224,17,95,.15)}

    .btn{margin-top:18px; padding:12px 24px; border-radius:12px; background:var(--accent); color:#fff; border:none; font-weight:700; cursor:pointer; font-family:'Creepster'; font-size:1.5rem; letter-spacing:1px; transition:.2s;}
    .btn:hover{filter:brightness(1.1); box-shadow:0 8px 25px rgba(224,17,95,.35)}
    .btn:disabled{opacity:.6; cursor:not-allowed}

    .stage-wrap{position:relative; height:220px; margin-top:12px; border-radius:14px; overflow:hidden; background:linear-gradient(180deg,#0a0a0a 0%, #151515 100%); border:1px dashed rgba(255,255,255,.12)}
    .ground{position:absolute; left:0; right:0; bottom:0; height:56px; background:repeating-linear-gradient(90deg, #0f0f0f 0 20px,#111 20px 40px)}

    .person, .reaper, .blood{position:absolute; bottom:56px; font-size:64px; filter:drop-shadow(0 3px 6px rgba(0,0,0,.6))}
    .person{right:40px;} /* standing at right corner */
    .reaper{left:-220px}
    .reaper img{width:90px; height:auto}
    .blood{display:none; font-size:54px; right:40px;}

    @keyframes reapWalk{0%{left:-220px} 100%{left:calc(100% - 140px)}}
    @keyframes splash{0%{transform:scale(0); opacity:0} 20%{transform:scale(1.2); opacity:1} 100%{transform:scale(1.6); opacity:.2}}

    .play .reaper{animation:reapWalk 4s linear forwards}
    .strike .person{opacity:0; transition:.4s}
    .strike .blood{display:block; animation:splash 1s ease-out forwards}

    .result{margin-top:20px; text-align:center; min-height:80px}
    .reveal{opacity:0; transform:translateY(8px); transition:opacity .6s ease, transform .6s ease}
    .reveal.show{opacity:1; transform:translateY(0)}
    .years{font-family:'Creepster'; font-size:2.2rem; text-shadow:0 0 14px var(--glow)}

    footer{margin:18px 0 30px; text-align:center; color:#888; font-size:.9rem}
  </style>
</head>
<body>
  <header>
    <h1>☠️ Death Predictor ☠️</h1>
    <div class="sub">Pick up to <b>5</b> foods. Then… The Reaper comes. 🪓</div>
  </header>

  <main class="container">
    <section class="form-grid">
      <div class="card">
        <h2>Your Vital Stats</h2>
        <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap">
          <label>Age: <input type="number" id="age" min="1" max="120" placeholder="e.g., 21"/></label>
          <div>
            <label class="inline"><input type="radio" name="gender" value="male"/> Male</label>
            <label class="inline"><input type="radio" name="gender" value="female"/> Female</label>
          </div>
        </div>
        <div style="margin-top:10px">
          <a href="https://youtu.be/xvFZjo5PgG0?si=UfRwVU-dOUiChuqx" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:bold">👉 Click here if you're brave</a>
        </div>
      </div>

      <div class="card">
        <h2>Pick Your Poison (max 5)</h2>
        <div class="foods" id="foods">
          <label><input type="checkbox" value="Pizza"/> 🍕 Pizza</label>
          <label><input type="checkbox" value="Burger"/> 🍔 Burger</label>
          <label><input type="checkbox" value="Salad"/> 🥗 Salad</label>
          <label><input type="checkbox" value="IceCream"/> 🍨 Ice Cream</label>
          <label><input type="checkbox" value="EnergyDrink"/> ⚡ Energy Drink</label>
          <label><input type="checkbox" value="Chocolate"/> 🍫 Chocolate</label>
          <label><input type="checkbox" value="FriedChicken"/> 🍗 Fried Chicken</label>
          <label><input type="checkbox" value="Fries"/> 🍟 Fries</label>
          <label><input type="checkbox" value="Fish"/> 🐟 Fish</label>
          <label><input type="checkbox" value="Broccoli"/> 🥦 Broccoli</label>
        </div>
        <button id="predictBtn" class="btn">🔮 Predict My Death</button>
      </div>
    </section>

    <section class="card">
      <h2>The Final Chase</h2>
      <div id="stage" class="stage-wrap">
        <div id="reaper" class="reaper">
            <img src="reaper.svg" alt="Grim Reaper" />
        </div>
        <div id="person" class="person">🧍</div>
        <div class="blood" id="blood">🩸</div>
        <div class="ground"></div>
      </div>
      <div id="result" class="result">
        <div id="resultText" class="reveal"></div>
      </div>
    </section>
  </main>

  <footer>Built for spooky laughs. Not medical advice. Probably cursed.</footer>

  <audio id="bgm" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1e2f5a9f2e.mp3" autoplay loop preload="auto" style="display:none"></audio>

  <script>
    const foodsMap = {
      Pizza:{toxic:15, energy:25}, Burger:{toxic:20, energy:20}, Salad:{toxic:1, energy:40},
      IceCream:{toxic:10, energy:10}, EnergyDrink:{toxic:30, energy:5}, Chocolate:{toxic:8, energy:15},
      FriedChicken:{toxic:25, energy:20}, Fries:{toxic:18, energy:10}, Fish:{toxic:5, energy:35}, Broccoli:{toxic:0, energy:50}
    };

    const foodBox = document.getElementById('foods');
    foodBox.addEventListener('change', (e)=>{
      const checked = foodBox.querySelectorAll('input[type="checkbox"]:checked');
      if(checked.length > 5){
        e.target.checked = false;
        alert('Pick at most FIVE foods. The Reaper can only count to 5.');
      }
    });

    const bgm = document.getElementById('bgm');
    function tryPlay(){ bgm.volume = 0.6; const p = bgm.play(); if(p){ p.catch(()=>{}); } }
    document.addEventListener('DOMContentLoaded', tryPlay);
    window.addEventListener('pointerdown', ()=>{ if(bgm.paused) tryPlay(); }, {once:true});

    const btn = document.getElementById('predictBtn');
    const stage = document.getElementById('stage');
    const person = document.getElementById('person');
    const reaper = document.getElementById('reaper');
    const blood = document.getElementById('blood');
    const resultText = document.getElementById('resultText');

    function computeYears(){
      let age = parseInt(document.getElementById('age').value || '0', 10);
      const genderEl = document.querySelector('input[name="gender"]:checked');
      const chosen = foodBox.querySelectorAll('input[type="checkbox"]:checked');
      if(!age || !genderEl || chosen.length < 4){
        alert('Enter age, choose gender, and pick at least 4 (max 5) foods.');
        return null;
      }
      const base = genderEl.value === 'male' ? 80 : 85;
      let tox = 0, eng = 0;
      chosen.forEach(cb=>{ const v = foodsMap[cb.value]; tox += v.toxic; eng += v.energy; });
      const yearsLeft = Math.round( (base - age) - (tox/10) + (eng/20) );
      return Math.max(yearsLeft, -99);
    }

    function showResult(years){
      let msg = '';
      if(years <= 0){ msg = `💀 It's over… You're already a ghost. (${years}y)`; }
      else if(years < 10){ msg = `⚠️ Only ${years} years left! Repent… or at least hydrate.`; }
      else if(years < 30){ msg = `😬 ${years} years left. Enjoy your fries while you can.`; }
      else { msg = `🎉 ${years} years left! Plenty of time to haunt group projects.`; }
      resultText.innerHTML = `<div class="years">${years} years</div><div>${msg}</div>`;
      resultText.classList.add('show');
    }

    function resetStage(){
      stage.classList.remove('play','strike');
      resultText.classList.remove('show');
      reaper.style.left = '-220px';
      person.style.opacity = 1;
      person.innerHTML = '🧍';
      blood.style.display = 'none';
    }

    btn.addEventListener('click', ()=>{
      const years = computeYears();
      if(years === null) return;

      btn.disabled = true; resetStage();
      stage.classList.add('play');

      setTimeout(()=>{
        stage.classList.add('strike');
        person.innerHTML = '⚰️';
      }, 4000);

      setTimeout(()=>{ showResult(years); btn.disabled = false; }, 5000);
    });
  </script>
</body>
</html>
